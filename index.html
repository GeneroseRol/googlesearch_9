<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .nav {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .nav a {
            text-decoration: none;
            color: #5f6368;
            margin-left: 20px;
            font-size: 14px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .search-box {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .logo {
            font-size: 90px;
            font-weight: bold;
            margin-bottom: 30px;
            user-select: none;
        }

        .blue { color: #4285F4; }
        .red { color: #EA4335; }
        .yellow { color: #FBBC05; }
        .green { color: #34A853; }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #dfe1e5;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:hover,
        input[type="text"]:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: transparent;
        }

        .buttons {
            margin-top: 30px;
        }

        input[type="submit"] {
            background: #f8f9fa;
            border: 1px solid #f8f9fa;
            color: #3c4043;
            padding: 10px 18px;
            margin: 0 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        input[type="submit"]:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 2px rgba(0,0,0,.1);
        }
    </style>
</head>

<body>

    <div class="nav">
        <a href="images_search.html">Image Search</a>
        <a href="advanced.html">Advanced Search</a>
    </div>

    <div class="search-box">

        <div class="logo">
            <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span>
        </div>

        <form action="https://www.google.com/search">

            <input type="text" name="q">

            <div class="buttons">
                <input type="submit" value="Google Search">
                <input type="submit" name="btnI" value="I'm Feeling Lucky">
            </div>

        </form>

    </div>

</body>
</html>
